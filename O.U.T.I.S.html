<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>O.U.T.I.S. // TRENCH CONSOLE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="O.U.T.I.S_CSS/O.U.T.I.S.css"/>
</head>
<body>
  
  <div id="grime-overlay"></div>

  <div id="main-interface">
    <div id="terminal-wrapper">
      <header>
        <div class="brand">
          <h2>O.U.T.I.S.</h2>
          <small>VORKUTA-6 HEAVY APPARATUS // BUILD 1.888</small>
        </div>
        <div id="system-clock">--:--:-- RMST</div>
        <button id="tools-toggle">[ DISENGAGE LOCKS ]</button>
      </header>
      
      <div id="terminal-housing">
        <div id="terminal">
          <div class="line system">Engaging mechanical relays... Feeding paper...</div>
        </div>
      </div>
      
      <div class="input-line">
        <span class="prompt">PUNCH DATA_></span>
        <input id="cli" type="text" autocomplete="off" placeholder="AWAITING KEYSTROKES..." autofocus />
      </div>
    </div>

    <div id="chat-wrapper">
      <header>
        <h3>RADIO RELAY TOWER</h3>
        <span class="status-indicator"></span>
      </header>
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="ENCODE MORSE..." autocomplete="off" />
      </div>
    </div>
  </div>

  <aside id="side-tray">
    <div class="tray-header">
      <h3>TACTICAL EQUIPMENT</h3>
      <button id="tray-close">X</button>
    </div>

    <div class="tool-section">
      <h4>MECHANICAL TUMBLERS</h4>
      <div id="dice-display">RATE: --</div>
      <div class="dice-grid">
        <button onclick="roll(4)">D4</button>
        <button onclick="roll(6)">D6</button>
        <button onclick="roll(8)">D8</button>
        <button onclick="roll(10)">D10</button>
        <button onclick="roll(12)">D12</button>
        <button onclick="roll(20)">D20</button>
        <button onclick="roll(100)">D100</button>
      </div>
    </div>

    <hr class="divider">

    <div class="tool-section">
      <h4>LOGISTICS CALIPER</h4>
      <div id="calc-screen">0</div>
      <div class="calc-grid">
        <button onclick="calc('7')">7</button>
        <button onclick="calc('8')">8</button>
        <button onclick="calc('9')">9</button>
        <button class="op" onclick="calc('/')">÷</button>
        <button onclick="calc('4')">4</button>
        <button onclick="calc('5')">5</button>
        <button onclick="calc('6')">6</button>
        <button class="op" onclick="calc('*')">×</button>
        <button onclick="calc('1')">1</button>
        <button onclick="calc('2')">2</button>
        <button onclick="calc('3')">3</button>
        <button class="op" onclick="calc('-')">-</button>
        <button class="clear" onclick="calc('C')">C</button>
        <button onclick="calc('0')">0</button>
        <button class="equal" onclick="calc('=')">=</button>
        <button class="op" onclick="calc('+')">+</button>
      </div>
    </div>
  </aside>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="O.U.T.I.S_Code/O.U.T.I.S.js"></script>
  <script src="O.U.T.I.S_Code/O.U.T.I.S_Side.js"></script>
</body>
</html>
